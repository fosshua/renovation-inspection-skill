retrieval_rules:
  - Prefer sources whose applies_to values match the observed room, trade, material, and defect.
  - Rank national_standard and mandatory_engineering_code above industry_standard.
  - Rank industry_standard above enterprise_benchmark unless the issue is only a workmanship best-practice comparison.
  - Do not cite enterprise_benchmark as a compliance failure unless the user explicitly asks against that company standard.
  - If only visual judgment applies, cite visual_practical_judgment and reduce confidence.
