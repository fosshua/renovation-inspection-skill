  source_verification_rule: >
    Verify the latest official text before contractual, legal, or acceptance use.
    Engineering construction standards may not be fully available in the national
    standard public reading system; use authoritative ministry, publisher, or
    licensed database sources where required.
  checked_date: "2026-05-11"

